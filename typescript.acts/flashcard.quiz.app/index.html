<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcard Quiz</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="flashcard-panel">
      <h1 class="title">Flash Card Quiz App</h1>
      <div class="flashcard-container">
        <div class="flashcard" id="flashcard"></div>
      </div>
    </div>
    <div class="control-panel">
      <h3>Manage Cards</h3>
      <button class="delete-btn" id="delete-btn" type="button">Delete</button>
      <hr />
      <h3>All Cards</h3>
      <div class="select-container" id="select-container"></div>
      <hr />
      <form class="entry-form" id="entry-form">
        <p>Add a New Card</p>
        <label class="label" for="front-text">Front:</label>
        <textarea class="front-input" id="front-text" required></textarea>
        <label class="label" for="back-text">Back:</label>
        <textarea class="back-input" id="back-text" required></textarea>
      </form>
      <div id="error-span"></div>
      <button class="save-button" id="save-button" type="button">Save new flash card</button>
    </div>
    <script src="index.ts"></script>
  </body>
</html>
